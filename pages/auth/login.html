<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/svg/logo.svg" type="image/svg+xml" />
    <title>Login</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/global.css" />

    <!-- JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

    <style>
      .bg-curve {
        height: 60%;
        background-image: url('https://images.unsplash.com/photo-1559839734-2b71ea197ec2?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        border-bottom-left-radius: 60% 10%;
        border-bottom-right-radius: 60% 10%;
      }
    </style>
  </head>
  <body class="bg-light">
    <main class="position-relative d-flex align-items-center justify-content-center overflow-hidden" style="height: 100dvh">
      <!-- Background Gambar -->
      <div class="bg-curve position-absolute top-0 start-0 w-100 z-0"></div>

      <!-- Container Utama -->
      <div class="container-fluid px-3 position-relative z-1 d-flex justify-content-center">
        <div class="card rounded-4 w-100 p-3" style="max-width: 420px">
          <div class="text-center mb-4">
            <!-- Logo Perusahaan -->
            <div class="bg-white border rounded-4 d-flex justify-content-center align-items-center mx-auto mb-4" style="width: 70px; height: 70px">
              <img src="/assets/img/logo.webp" class="w-75 h-75" alt="Logo PT. ANDALAN ARGO PERSADA" />
            </div>

            <!-- Welcome Text -->
            <h5 class="fw-bold mb-1">Selamat Datang Kembali 🙌</h5>
            <p class="text-secondary">Silahkan login untuk melanjutkan</p>
          </div>

          <!-- Input Form -->
          <form>
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" placeholder="Masukkan Username..." class="form-control" id="username" name="username" required />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="text" placeholder="Masukkan Password..." class="form-control" id="password" name="password" required />
            </div>
            <button type="submit" class="btn btn-argo-primary w-100">Login</button>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
